# Increase the memory available to Gradle (a full chiseledBuild processes 13 Minecraft jars).
org.gradle.jvmargs=-Xmx4G
# Kept sequential: TLS-inspecting middleboxes (AV/firewall) drop *concurrent* TLS handshakes to
# maven.fabricmc.net, so parallel downloads fail intermittently. Slower but reliable.
org.gradle.parallel=false

# Workaround for TLS-inspecting middleboxes (AV/firewall) that drop concurrent TLS 1.3
# handshakes to maven.fabricmc.net. Pin the Gradle JVM to TLS 1.2 for stable downloads.
# Affects only the build JVM, not the mod runtime.
systemProp.https.protocols=TLSv1.2
systemProp.jdk.tls.client.protocols=TLSv1.2

# Loom is not yet fully compatible with the configuration cache.
org.gradle.configuration-cache=false

# Configure only the projects needed for the requested tasks. With 13 version nodes this keeps a
# single-version build (e.g. `:1.21.8:build`) from configuring and resolving every other node.
org.gradle.configureondemand=true

# Acknowledge Stonecutter's Groovy-buildscript notice (this project intentionally uses Groovy DSL).
dev.kikugie.stonecutter.hard_mode=true

# Toolchain / build
# Loom 1.17.x supports the whole 1.21.1 -> 26.x Minecraft range from a single plugin version.
loom_version=1.17.11

# Shared mod properties (per-version Minecraft / Fabric API live in versions/<version>/gradle.properties)
loader_version=0.19.3
mod_version=0.2.0
maven_group=dev.mcpfabric
archives_base_name=mcpfabric
