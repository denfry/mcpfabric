// Stonecutter controller (root project). The per-version mod build lives in build.gradle,
// which Stonecutter applies to every version node declared in settings.gradle.
plugins {
	id 'dev.kikugie.stonecutter'
	// Both Loom plugins are put on the classpath (apply false) so each version node can apply the
	// right one without repeating the version: -remap for obfuscated Minecraft (<=1.21.11), plain
	// fabric-loom for unobfuscated Minecraft (26.1+). Loom 1.17.x covers the whole range.
	id 'net.fabricmc.fabric-loom-remap' version "${loom_version}" apply false
	id 'net.fabricmc.fabric-loom' version "${loom_version}" apply false
	// Modrinth publishing. Put on the classpath here (apply false) and applied per node in
	// build.gradle, so every version node can publish its own jar without repeating the version.
	id 'com.modrinth.minotaur' version '2.9.0' apply false
}

stonecutter.active('1.21.8') /* [SC] DO NOT EDIT */

// `./gradlew chiseledBuild` builds every declared version node in one go (used by CI).
tasks.register('chiseledBuild') {
	group = 'project'
	description = 'Builds every supported Minecraft version'
	dependsOn(stonecutter.tasks.named('build'))
}

// `./gradlew publishMods` runs every node's `modrinth` task, uploading one Modrinth version per
// supported Minecraft version (e.g. 0.2.0+1.21.8). Used by the release workflow on a `v*` tag.
// Requires MODRINTH_TOKEN in the environment and `modrinth_id` set in gradle.properties; without a
// token each node runs in debug mode (builds + validates, uploads nothing).
tasks.register('publishMods') {
	group = 'publishing'
	description = 'Publishes every supported Minecraft version to Modrinth'
	dependsOn(stonecutter.tasks.named('modrinth'))
}
