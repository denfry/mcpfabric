name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mod:
    name: Build mod (all versions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDKs (21 for 1.21.x, 25 for 26.x)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build every supported Minecraft version
        # The daemon runs on JDK 25 (last setup-java entry); tell Gradle where both JDKs live so the
        # 1.21.x compile toolchain (21) is found without re-downloading it via the foojay resolver.
        run: ./gradlew chiseledBuild --stacktrace -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: mcpfabric-jars
          path: |
            versions/*/build/libs/*.jar
            !versions/*/build/libs/*-sources.jar
          if-no-files-found: error

  mcp-server:
    name: MCP server (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
