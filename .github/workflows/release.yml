name: Release

# Cut a release by pushing a tag that matches the mod version, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
# This builds every supported Minecraft version, publishes them to Modrinth, and creates a GitHub
# Release with all the jars attached. See docs/RELEASING.md for the full runbook.
on:
  push:
    tags: [ 'v*' ]
  # Manual fallback: lets you re-run a release from the Actions tab. Creates the tag if missing.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release without the leading v (e.g. 0.2.0)'
        required: true

permissions:
  contents: write   # create the GitHub Release and (for workflow_dispatch) the tag

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish all versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Resolve release version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches gradle.properties
        run: |
          MOD_VERSION=$(grep -E '^mod_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')
          if [ "$MOD_VERSION" != "${{ steps.v.outputs.version }}" ]; then
            echo "::error::Release version '${{ steps.v.outputs.version }}' does not match mod_version='$MOD_VERSION' in gradle.properties. Bump mod_version (and CHANGELOG.md) before tagging."
            exit 1
          fi

      - name: Set up JDKs (21 for 1.21.x, 25 for 26.x)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build every supported Minecraft version
        # The daemon runs on JDK 25 (last setup-java entry); point Gradle at both JDKs so the 1.21.x
        # compile toolchain (21) is found without re-downloading it via the foojay resolver.
        run: ./gradlew chiseledBuild --stacktrace -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64

      - name: Publish all versions to Modrinth
        run: ./gradlew publishMods --stacktrace -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: mcpfabric ${{ steps.v.outputs.version }}
          tag_name: ${{ steps.v.outputs.tag }}
          files: |
            versions/*/build/libs/*.jar
            !versions/*/build/libs/*-sources.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tag a pre-release when the version carries a suffix (e.g. 0.2.0-beta.1, 0.3.0-rc.1).
          prerelease: ${{ contains(steps.v.outputs.version, '-') }}
