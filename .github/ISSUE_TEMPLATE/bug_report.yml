name: Bug report
description: Report a problem with the mod or the MCP server
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill in as much as you can.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part is affected?
      options:
        - Fabric mod (in-game bridge)
        - MCP server (TypeScript)
        - Both / not sure
    validations:
      required: true
  - type: input
    id: mc-version
    attributes:
      label: Minecraft version
      placeholder: "e.g. 1.21.8"
    validations:
      required: true
  - type: input
    id: side
    attributes:
      label: Side
      description: Client, dedicated server, or both? (run get_status if unsure)
      placeholder: "client / server / both"
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Loader / Fabric API / mcpfabric versions
      placeholder: "Loader 0.19.3, Fabric API 0.136.1+1.21.8, mcpfabric 0.2.0"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead? Which MCP tool / RPC method was involved?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Mod log lines and/or MCP server output. Redact your bridge token.
      render: text
    validations:
      required: false
